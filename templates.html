<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Template – Resume By Ame</title>
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/SRTd6c43/A-minimalistic-favicon-for-a-202606251237.jpg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">✨ Resume By Ame</a>
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="templates.html" class="active">Templates</a></li>
                <li><a href="templates.html">Build Resume</a></li>
                <li id="dashboardLink" style="display:none;"><a href="dashboard.html">Dashboard</a></li>
                <li id="authLink" style="display:none;"><a href="login.html" class="btn-login">Login / Sign Up</a></li>
                <li id="userDisplay" style="display:none;">
                    <span id="userName"></span>
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="templates-container">
        <h2>Select Your Resume Template</h2>
        <p class="subtitle">Currently available – formal government‑style CV. More coming soon!</p>
        <div class="template-grid">
            <!-- Only one template: Formal CV -->
            <a href="form.html?template=formal" class="template-card">
                <div class="template-preview formal-preview">
                    <div class="mini-resume">
                        <div class="mini-header formal-header">📄 Formal CV</div>
                        <div class="mini-details">Government Style · Clean · Professional</div>
                    </div>
                </div>
                <div class="template-name">John Doe</div>
            </a>
        </div>
    </main>

    <footer>
        <p>Made with ❤️ by Ame</p>
    </footer>

    <script src="js/animations.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLX-DBrAZZgi7OGRW3-oeno0PJsZ9hzEg",
            authDomain: "its-me-ame.firebaseapp.com",
            projectId: "its-me-ame",
            storageBucket: "its-me-ame.firebasestorage.app",
            messagingSenderId: "832380884001",
            appId: "1:832380884001:web:0c9239588ceb8d8995bf60"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const authLink = document.getElementById('authLink');
        const userDisplay = document.getElementById('userDisplay');
        const userNameSpan = document.getElementById('userName');
        const logoutBtn = document.getElementById('logoutBtn');
        const dashboardLink = document.getElementById('dashboardLink');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navLinks = document.getElementById('navLinks');

        hamburgerBtn.addEventListener('click', () => navLinks.classList.toggle('show'));

        auth.onAuthStateChanged(user => {
            if (user) {
                authLink.style.display = 'none';
                userDisplay.style.display = 'flex';
                userNameSpan.textContent = user.displayName || user.email;
                dashboardLink.style.display = 'inline-block';
            } else {
                authLink.style.display = 'block';
                userDisplay.style.display = 'none';
                dashboardLink.style.display = 'none';
            }
        });
        logoutBtn.addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));
    </script>
</body>
</html>
