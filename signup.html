<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – Resume By Ame</title>
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/SRTd6c43/A-minimalistic-favicon-for-a-202606251237.jpg">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">✨ Resume By Ame</a>
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="templates.html">Templates</a></li>
                <li id="dashboardLink" style="display:none;"><a href="dashboard.html">Dashboard</a></li>
                <li id="authLink" style="display:none;"><a href="login.html" class="btn-login">Login / Sign Up</a></li>
                <li id="userDisplay" style="display:none;">
                    <span id="userName"></span>
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Create Account</h2>
            <div id="authError" class="auth-error" style="display:none;"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="signupName" required placeholder="Your name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" class="cta-button full-width">Sign Up</button>
            </form>

            <div class="divider"><span>or</span></div>

            <button class="google-btn full-width" id="googleSignupBtn">
                <span class="google-icon">G</span> Sign up with Google
            </button>

            <p class="auth-switch">Already have an account? <a href="login.html">Log In</a></p>
            <p class="auth-switch"><a href="index.html">← Back to Home</a></p>
        </div>
    </main>

    <footer>
        <p>Made with ❤️ by Ame</p>
    </footer>

    <script src="js/animations.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLX-DBrAZZgi7OGRW3-oeno0PJsZ9hzEg",
            authDomain: "its-me-ame.firebaseapp.com",
            projectId: "its-me-ame",
            storageBucket: "its-me-ame.firebasestorage.app",
            messagingSenderId: "832380884001",
            appId: "1:832380884001:web:0c9239588ceb8d8995bf60"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const authLink = document.getElementById('authLink');
        const userDisplay = document.getElementById('userDisplay');
        const userNameSpan = document.getElementById('userName');
        const logoutBtn = document.getElementById('logoutBtn');
        const dashboardLink = document.getElementById('dashboardLink');
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const navLinks = document.getElementById('navLinks');

        hamburgerBtn.addEventListener('click', () => navLinks.classList.toggle('show'));

        auth.onAuthStateChanged(user => {
            if (user) {
                authLink.style.display = 'none';
                userDisplay.style.display = 'flex';
                userNameSpan.textContent = user.displayName || user.email;
                dashboardLink.style.display = 'inline-block';
            } else {
                authLink.style.display = 'block';
                userDisplay.style.display = 'none';
                dashboardLink.style.display = 'none';
            }
        });

        logoutBtn.addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));

        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const errorDiv = document.getElementById('authError');
            errorDiv.style.display = 'none';
            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields.';
                errorDiv.style.display = 'block';
                return;
            }
            auth.createUserWithEmailAndPassword(email, password)
                .then(userCredential => {
                    return userCredential.user.updateProfile({ displayName: name });
                })
                .then(() => window.location.href = 'dashboard.html')
                .catch(error => {
                    errorDiv.textContent = error.message;
                    errorDiv.style.display = 'block';
                });
        });

        document.getElementById('googleSignupBtn').addEventListener('click', () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            const errorDiv = document.getElementById('authError');
            errorDiv.style.display = 'none';
            auth.signInWithPopup(provider)
                .then(() => window.location.href = 'dashboard.html')
                .catch(error => {
                    errorDiv.textContent = error.message;
                    errorDiv.style.display = 'block';
                });
        });
    </script>
</body>
</html>
