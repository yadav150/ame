<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Resume By Dav ♥️ Ame</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="https://i.postimg.cc/qRrpyL9Z/46141.png">
<link rel="apple-touch-icon" href="https://i.postimg.cc/qRrpyL9Z/46141.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="mobile-sidebar" id="mobileSidebar">
    <div class="sidebar-header">
        <span class="sidebar-logo">Resume By Dav ♥️ Ame</span>
        <button class="sidebar-close" id="sidebarClose">✕</button>
    </div>
    <nav class="sidebar-nav">
        <a href="index.html" class="sidebar-link active">🏠 Home</a>
        <a href="index.html#templates" class="sidebar-link">📄 Templates</a>
        <a href="contact.html" class="sidebar-link">📧 Contact</a>
        <a href="login.html" class="sidebar-link" id="sidebarLoginLink">🔑 Login</a>
        <a href="signup.html" class="sidebar-link" id="sidebarSignupLink">📝 Signup</a>
        <a href="dashboard.html" class="sidebar-link" id="sidebarDashboardLink" style="display:none;">📊 Dashboard</a>
        <a href="#" class="sidebar-link" id="sidebarLogoutLink" style="display:none;">🚪 Logout</a>
    </nav>
</aside>

<!-- NAVBAR -->
<header class="navbar">
    <div class="nav-container">
        <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <a href="index.html" class="nav-logo">Resume By Dav ♥️ Ame</a>
        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="index.html#templates">Templates</a>
            <a href="contact.html">Contact</a>
            <a href="login.html" id="navLogin">Login</a>
            <a href="signup.html" id="navSignup">Signup</a>
            <a href="dashboard.html" id="navDashboard" style="display:none;">Dashboard</a>
            <a href="#" id="navLogout" style="display:none;">Logout</a>
        </nav>
    </div>
</header>
    <main class="auth-page">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <div class="auth-avatar">📝</div>
                <h2>Create Account</h2>
                <p>Sign up to save your resumes</p>
            </div>
            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="Your full name" required>
                    <span class="error-msg" id="signupNameError"></span>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    <span class="error-msg" id="signupEmailError"></span>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6">
                    <span class="error-msg" id="signupPasswordError"></span>
                </div>
                <div class="form-group">
                    <label for="signupConfirm">Confirm Password</label>
                    <input type="password" id="signupConfirm" placeholder="Re-enter password" required>
                    <span class="error-msg" id="signupConfirmError"></span>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account 🎉</button>

                <!-- Google Sign-Up Button -->
                <div class="social-divider">
                    <span>or</span>
                </div>
                <button type="button" class="btn btn-outline btn-block google-btn" id="googleSignupBtn">
                    <!-- Google icon SVG -->
                    <svg width="20" height="20" viewBox="0 0 24 24" style="margin-right:8px;">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>Made with ♥️ by Dav & Ame — © 2026</p>
        </div>
    </footer>

    <!-- Firebase SDKs (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <!-- Firebase init -->
    <script src="js/firebase-init.js"></script>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initNavigation();
            initSidebar();
            initScrollAnimations();
            initSignupForm();
        });
    </script>
</body>
</html>
