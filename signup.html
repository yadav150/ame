<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Resume By Dav ♥️ Ame</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="mobile-sidebar" id="mobileSidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">Resume By Dav ♥️ Ame</span>
            <button class="sidebar-close" id="sidebarClose">✕</button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link">🏠 Home</a>
            <a href="index.html#templates" class="sidebar-link">📄 Templates</a>
            <a href="login.html" class="sidebar-link">🔑 Login</a>
            <a href="signup.html" class="sidebar-link active">📝 Signup</a>
        </nav>
    </aside>

    <header class="navbar">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <a href="index.html" class="nav-logo">Resume By Dav ♥️ Ame</a>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="index.html#templates">Templates</a>
                <a href="login.html">Login</a>
                <a href="signup.html">Signup</a>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card fade-in">
            <div class="auth-header">
                <div class="auth-avatar">📝</div>
                <h2>Create Account</h2>
                <p>Sign up to save your resumes</p>
            </div>
            <form class="auth-form" id="signupForm">
                <div class="form-group">
                    <label for="signupName">Full Name</label>
                    <input type="text" id="signupName" placeholder="Your full name" required>
                    <span class="error-msg" id="signupNameError"></span>
                </div>
                <div class="form-group">
                    <label for="signupEmail">Email Address</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    <span class="error-msg" id="signupEmailError"></span>
                </div>
                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <input type="password" id="signupPassword" placeholder="Min 6 characters" required minlength="6">
                    <span class="error-msg" id="signupPasswordError"></span>
                </div>
                <div class="form-group">
                    <label for="signupConfirm">Confirm Password</label>
                    <input type="password" id="signupConfirm" placeholder="Re-enter password" required>
                    <span class="error-msg" id="signupConfirmError"></span>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account 🎉</button>
            </form>
            <div class="auth-footer">
                <p>Already have an account? <a href="login.html">Login here</a></p>
                <p class="demo-hint">💡 Demo: Any valid email works</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>Made with ♥️ by Dav & Ame — © 2026</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initNavigation();
            initSidebar();
            initScrollAnimations();   // ← ADDED
            initSignupForm();
        });
    </script>
</body>
</html>
