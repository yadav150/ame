<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="resume.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="resume.js" defer></script>
</head>
<body>
    <nav class="navbar builder-nav">
        <div class="container navbar__container">
            <a href="index.html" class="navbar__logo"><i class="fas fa-file-alt"></i><span>Resume<span class="navbar__logo-highlight">Builder</span></span></a>
            <a href="index.html" class="btn btn--outline btn--small"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </nav>

    <div class="builder">
        <!-- LEFT PANEL: Form -->
        <div class="builder__form" id="resumeForm">
            <div class="builder__form-inner">
                <h2 class="builder__form-title"><i class="fas fa-pen-fancy"></i> Create Your Resume</h2>

                <!-- ===== PERSONAL INFORMATION ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">Personal Information</h3>
                    <div class="form-group"><label>Full Name <span class="required">*</span></label><input type="text" id="fullName" /></div>
                    <div class="form-group"><label>Email Address <span class="required">*</span></label><input type="email" id="email" /></div>
                    <div class="form-group"><label>Phone Number <span class="required">*</span></label><input type="tel" id="phone" /></div>
                    <div class="form-group"><label>Address <span class="required">*</span></label><input type="text" id="address" /></div>
                </section>

                <!-- ===== PROFILE ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">Profile <span class="required">*</span></h3>
                    <div class="form-group"><textarea id="profile" rows="5" placeholder="Describe your professional background..."></textarea></div>
                </section>

                <!-- ===== PROFESSIONAL EXPERIENCE ===== -->
                <section class="form-section" id="experienceSection">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Professional Experience</h3>
                        <button class="btn btn--primary btn--small add-btn" id="addExpBtn"><i class="fas fa-plus"></i> Add</button>
                    </div>
                    <div class="entry-list" id="experienceList"></div>
                </section>

                <!-- ===== EDUCATION ===== -->
                <section class="form-section" id="educationSection">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Education</h3>
                        <button class="btn btn--primary btn--small add-btn" id="addEduBtn"><i class="fas fa-plus"></i> Add</button>
                    </div>
                    <div class="entry-list" id="educationList"></div>
                </section>

                <!-- ===== PHOTO UPLOAD ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">Photo</h3>
                    <div class="form-group">
                        <div class="file-upload-group">
                            <label class="file-upload-label">
                                <i class="fas fa-upload"></i> Choose Photo
                                <input type="file" id="photoUpload" accept="image/*" />
                            </label>
                            <div class="photo-preview" id="photoPreview"><i class="fas fa-user"></i></div>
                        </div>
                    </div>
                </section>

                <!-- ===== GENERATE BUTTON ===== -->
                <button class="btn btn--primary btn--large" id="generateBtn" style="width:100%;justify-content:center; margin-top:16px;">
                    <i class="fas fa-file-pdf"></i> Generate Resume
                </button>
                <div id="spinnerContainer" style="display:none; text-align:center; margin-top:16px;">
                    <i class="fas fa-spinner fa-spin fa-2x" style="color:var(--primary);"></i>
                    <p>Generating your resume, please wait...</p>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="builder__preview">
            <div>
                <i class="fas fa-file-alt" style="font-size:4rem; margin-bottom:1rem; opacity:0.3;"></i>
                <h3>Resume Preview</h3>
                <p>Fill in the form and click "Generate Resume" to create your PDF.</p>
                <p style="font-size:0.85rem;">All required fields must be filled (*).</p>
            </div>
        </div>
    </div>

    <!-- Hidden container for PDF generation -->
    <div id="pdfContainer" style="position:absolute; left:-9999px; top:0; width:210mm; padding:15px; background:#fff; box-sizing:border-box;"></div>
</body>
</html>
