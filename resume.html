<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder — Create Your Resume</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="resume.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <!-- PDF libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="resume.js" defer></script>
</head>
<body>
    <!-- Minimal Nav for Builder -->
    <nav class="navbar builder-nav">
        <div class="container navbar__container">
            <a href="index.html" class="navbar__logo"><i class="fas fa-file-alt"></i><span>Resume<span class="navbar__logo-highlight">Builder</span></span></a>
            <a href="index.html" class="btn btn--outline btn--small"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </nav>

    <div class="builder">
        <!-- LEFT PANEL: Form -->
        <div class="builder__form" id="resumeForm">
            <div class="builder__form-inner">
                <h2 class="builder__form-title"><i class="fas fa-pen-fancy"></i> Create Your Resume</h2>

                <!-- ===== SECTION 1: PERSONAL DETAILS ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">1. Personal Details</h3>

                    <div class="form-group">
                        <label>Full Name <span class="required">*</span></label>
                        <input type="text" id="applicantName" placeholder="e.g. YADAV SUBBA" />
                    </div>
                    <div class="form-group">
                        <label>Father's Name</label>
                        <input type="text" id="fatherName" placeholder="e.g. LT DILLI SINGH SUBBA" />
                    </div>
                    <div class="form-group">
                        <label>Mother's Name</label>
                        <input type="text" id="motherName" placeholder="e.g. DIL MAYA SUBBA" />
                    </div>
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="text" id="dob" placeholder="e.g. 08/09/2003" />
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select id="gender">
                            <option value="">-- Select Gender --</option>
                            <option value="MALE">MALE</option>
                            <option value="FEMALE">FEMALE</option>
                            <option value="OTHER">OTHER</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            <option value="">-- Select Category --</option>
                            <option value="General">General</option>
                            <option value="OBC/MOBC">OBC/MOBC</option>
                            <option value="SC">SC</option>
                            <option value="ST">ST</option>
                            <option value="EWS">EWS</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Marital Status</label>
                        <select id="maritalStatus">
                            <option value="">-- Select Marital Status --</option>
                            <option value="UNMARRIED">UNMARRIED</option>
                            <option value="MARRIED">MARRIED</option>
                            <option value="DIVORCED">DIVORCED</option>
                            <option value="WIDOWED">WIDOWED</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Known Languages</label>
                        <input type="text" id="knownLanguages" placeholder="e.g. NEPALI, ENGLISH, HINDI" />
                    </div>
                    <div class="form-group">
                        <label>Mobile Number <span class="required">*</span></label>
                        <input type="tel" id="mobileNumber" placeholder="e.g. 7896579939" />
                    </div>
                    <div class="form-group">
                        <label>Email Address <span class="required">*</span></label>
                        <input type="email" id="emailAddress" placeholder="yadavsubba2003@gmail.com" />
                    </div>
                    <div class="form-group">
                        <label>Address / P.O.</label>
                        <input type="text" id="address" placeholder="e.g. HAWAIPUR, PO Dayagmukh" />
                    </div>
                    <div class="form-group">
                        <label>Experience</label>
                        <input type="text" id="experience" placeholder="e.g. FRESHER" />
                    </div>
                </section>

                <!-- ===== SECTION 2: OBJECTIVE ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">2. Objective / Career Goal</h3>
                    <div class="form-group">
                        <textarea id="objective" rows="4" placeholder="e.g. To work with an organization where I can learn new skills and increase my abilities for the organizational goals as well as myself."></textarea>
                    </div>
                </section>

                <!-- ===== SECTION 3: EDUCATIONAL QUALIFICATIONS ===== -->
                <section class="form-section" id="educationSection">
                    <div class="form-section__header">
                        <h3 class="form-section__title">3. Educational Qualifications</h3>
                        <button class="btn btn--primary btn--small add-btn" data-section="education"><i class="fas fa-plus"></i> Add More</button>
                    </div>
                    <div class="entry-list" id="educationList"></div>
                </section>

                <!-- ===== SECTION 4: OTHER QUALIFICATIONS ===== -->
                <section class="form-section" id="otherQualificationSection">
                    <div class="form-section__header">
                        <h3 class="form-section__title">4. Other Qualifications</h3>
                        <button class="btn btn--primary btn--small add-btn" data-section="otherQualification"><i class="fas fa-plus"></i> Add More</button>
                    </div>
                    <div class="entry-list" id="otherQualificationList"></div>
                </section>

                <!-- ===== SECTION 5: FINAL STEPS ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">5. Final Steps</h3>

                    <div class="form-group">
                        <label>Upload Photo (optional)</label>
                        <div class="file-upload-group">
                            <label class="file-upload-label">
                                <i class="fas fa-upload"></i> Choose Photo
                                <input type="file" id="photoUpload" accept="image/*" />
                            </label>
                            <div class="photo-preview" id="photoPreview"><i class="fas fa-user"></i></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Place (for Declaration)</label>
                        <input type="text" id="place" placeholder="e.g. Guwahati" />
                    </div>

                    <div class="form-group declaration-group">
                        <label class="declaration-label">
                            <input type="checkbox" id="declaration" checked />
                            I hereby declare that the above particulars of facts and information stated are true, correct and complete to the best of my belief and knowledge.
                        </label>
                    </div>

                    <button class="btn btn--primary btn--large" id="generateResumeBtn" style="width:100%;justify-content:center;">
                        <i class="fas fa-file-pdf"></i> Generate My Resume
                    </button>
                </section>

                <!-- Hidden controls -->
                <div class="form-actions" style="display:none;">
                    <button class="btn btn--primary" id="loadSampleBtn"><i class="fas fa-file-import"></i> Load Sample</button>
                    <button class="btn btn--primary" id="clearFormBtn"><i class="fas fa-undo"></i> Clear Form</button>
                    <button class="btn btn--outline" id="resetResumeBtn"><i class="fas fa-trash"></i> Reset Resume</button>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: Preview -->
        <div class="builder__preview">
            <div class="builder__preview-toolbar">
                <span><i class="fas fa-eye"></i> Live Preview</span>
                <div class="preview-controls">
                    <select id="templateSelector">
                        <option value="modern">Modern</option>
                        <option value="classic">Classic</option>
                        <option value="creative">Creative</option>
                        <option value="minimal">Minimal</option>
                    </select>

                    <button class="preview-control" id="layoutToggle" title="Toggle Layout">
                        <i class="fas fa-columns"></i> <span id="layoutLabel">Two Column</span>
                    </button>

                    <input type="color" id="accentColorPicker" value="#4f46e5" title="Choose accent color" />

                    <button class="preview-control" id="downloadPdfBtn" title="Download PDF">
                        <i class="fas fa-file-pdf"></i> PDF
                    </button>
                    <button class="preview-control" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <select id="fontSelector">
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Georgia', serif">Georgia</option>
                        <option value="'Arial', sans-serif">Arial</option>
                    </select>
                    <select id="fontSizeSelector">
                        <option value="14">14px</option>
                        <option value="16" selected>16px</option>
                        <option value="18">18px</option>
                        <option value="20">20px</option>
                    </select>
                </div>
            </div>
            <div class="builder__preview-content" id="resumePreview">
                <!-- Dynamic preview rendered by JavaScript -->
            </div>
        </div>
    </div>
</body>
</html>
