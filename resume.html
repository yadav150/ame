<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="resume.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <!-- PDF libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="resume.js" defer></script>
</head>
<body>
    <!-- Minimal Nav -->
    <nav class="navbar builder-nav">
        <div class="container navbar__container">
            <a href="index.html" class="navbar__logo"><i class="fas fa-file-alt"></i><span>Resume<span class="navbar__logo-highlight">Builder</span></span></a>
            <a href="index.html" class="btn btn--outline btn--small"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </nav>

    <div class="builder">
        <!-- LEFT PANEL: Form -->
        <div class="builder__form" id="resumeForm">
            <div class="builder__form-inner">
                <h2 class="builder__form-title"><i class="fas fa-pen-fancy"></i> Create Your Resume</h2>

                <!-- ===== PERSONAL DETAILS ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">1. Personal Details</h3>
                    <div class="form-group"><label>Full Name</label><input type="text" id="applicantName" /></div>
                    <div class="form-group"><label>Designation</label><input type="text" id="designation" /></div>
                    <div class="form-group"><label>Address</label><textarea id="address" rows="3"></textarea></div>
                    <div class="form-group"><label>Mobile Number</label><input type="tel" id="mobileNumber" /></div>
                    <div class="form-group"><label>Email Address</label><input type="email" id="emailAddress" /></div>
                </section>

                <!-- ===== CAREER OBJECTIVE ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">2. Career Objective</h3>
                    <div class="form-group"><textarea id="objective" rows="4"></textarea></div>
                </section>

                <!-- ===== ACADEMIC QUALIFICATIONS ===== -->
                <section class="form-section" id="educationSection">
                    <div class="form-section__header">
                        <h3 class="form-section__title">3. Academic Qualifications</h3>
                        <button class="btn btn--primary btn--small add-btn" data-section="education"><i class="fas fa-plus"></i> Add Row</button>
                    </div>
                    <div class="entry-list" id="educationList"></div>
                </section>

                <!-- ===== OTHER QUALIFICATIONS ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">4. Other Qualifications</h3>
                    <div class="form-group"><textarea id="otherQualifications" rows="4" placeholder="Each qualification on a new line"></textarea></div>
                </section>

                <!-- ===== WORK EXPERIENCE ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">5. Work Experience</h3>
                    <div class="form-group"><textarea id="workExperience" rows="4" placeholder="Each experience on a new line"></textarea></div>
                </section>

                <!-- ===== PERSONAL INFORMATION ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">6. Personal Information</h3>
                    <div class="form-group"><label>Father's Name</label><input type="text" id="fatherName" /></div>
                    <div class="form-group"><label>Date of Birth</label><input type="text" id="dob" placeholder="e.g. 1999-08-07" /></div>
                    <div class="form-group"><label>Language Known</label><input type="text" id="languageKnown" /></div>
                    <div class="form-group"><label>Gender</label>
                        <select id="gender">
                            <option value="">-- Select --</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Nationality</label><input type="text" id="nationality" /></div>
                    <div class="form-group"><label>Marital Status</label>
                        <select id="maritalStatus">
                            <option value="">-- Select --</option>
                            <option value="Unmarried">Unmarried</option>
                            <option value="Married">Married</option>
                            <option value="Divorced">Divorced</option>
                            <option value="Widowed">Widowed</option>
                        </select>
                    </div>
                </section>

                <!-- ===== DECLARATION ===== -->
                <section class="form-section">
                    <h3 class="form-section__title">7. Declaration</h3>
                    <div class="form-group"><label>Place</label><input type="text" id="place" /></div>
                    <div class="form-group declaration-group">
                        <label class="declaration-label">
                            <input type="checkbox" id="declaration" checked />
                            I hereby declared that the above information given by me is true to best of my Knowledge.
                        </label>
                    </div>
                    <button class="btn btn--primary btn--large" style="width:100%;justify-content:center;" onclick="generateResume()">
                        <i class="fas fa-file-pdf"></i> Generate Resume
                    </button>
                </section>
            </div>
        </div>

        <!-- RIGHT PANEL: Preview -->
        <div class="builder__preview">
            <div class="builder__preview-toolbar">
                <span><i class="fas fa-eye"></i> Live Preview</span>
                <div class="preview-controls">
                    <button class="preview-control" id="downloadPdfBtn" title="Download PDF"><i class="fas fa-file-pdf"></i> PDF</button>
                    <button class="preview-control" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <select id="fontSelector">
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Georgia', serif">Georgia</option>
                        <option value="'Arial', sans-serif">Arial</option>
                    </select>
                    <select id="fontSizeSelector">
                        <option value="14">14px</option>
                        <option value="16" selected>16px</option>
                        <option value="18">18px</option>
                        <option value="20">20px</option>
                    </select>
                </div>
            </div>
            <div class="builder__preview-content" id="resumePreview">
                <!-- Dynamic preview rendered by JavaScript -->
            </div>
        </div>
    </div>
</body>
</html>
