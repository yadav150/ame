<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume Builder — Create Your Resume</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="resume.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />

    <!-- PDF libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script src="resume.js" defer></script>
</head>
<body>
    <!-- Minimal Nav for Builder -->
    <nav class="navbar builder-nav">
        <div class="container navbar__container">
            <a href="index.html" class="navbar__logo"><i class="fas fa-file-alt"></i><span>Resume<span class="navbar__logo-highlight">Builder</span></span></a>
            <a href="index.html" class="btn btn--outline btn--small"><i class="fas fa-arrow-left"></i> Back</a>
        </div>
    </nav>

    <div class="builder">
        <!-- LEFT PANEL: Form -->
        <div class="builder__form" id="resumeForm">
            <div class="builder__form-inner">
                <h2 class="builder__form-title"><i class="fas fa-pen-fancy"></i> Edit Your Resume</h2>

                <!-- Personal Info (always visible) -->
                <section class="form-section">
                    <h3 class="form-section__title">Personal Information</h3>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="e.g. John Doe" />
                    </div>
                    <div class="form-group">
                        <label>Professional Title</label>
                        <input type="text" id="profTitle" placeholder="e.g. Software Engineer" />
                    </div>
                    <div class="form-group">
                        <label>Profile Photo</label>
                        <input type="file" id="photoUpload" accept="image/*" />
                        <div class="photo-preview" id="photoPreview"><i class="fas fa-user"></i></div>
                    </div>
                    <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="john@example.com" /></div>
                    <div class="form-group"><label>Phone</label><input type="text" id="phone" placeholder="+1 234 567 890" /></div>
                    <div class="form-group"><label>Address</label><input type="text" id="address" placeholder="City, Country" /></div>
                    <div class="form-group"><label>LinkedIn</label><input type="url" id="linkedin" placeholder="linkedin.com/in/yourname" /></div>
                    <div class="form-group"><label>GitHub</label><input type="url" id="github" placeholder="github.com/yourname" /></div>
                    <div class="form-group"><label>Portfolio</label><input type="url" id="portfolio" placeholder="yourportfolio.com" /></div>
                </section>

                <!-- Summary (always visible) -->
                <section class="form-section">
                    <h3 class="form-section__title">Professional Summary</h3>
                    <div class="form-group">
                        <textarea id="summary" rows="4" placeholder="Write a brief summary of your professional background..."></textarea>
                    </div>
                </section>

                <!-- Education (with toggle) -->
                <section class="form-section" id="educationSection">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Education</h3>
                        <label class="toggle-label">
                            <input type="checkbox" class="section-toggle" data-section="education" checked />
                            <span>Show</span>
                        </label>
                        <button class="btn btn--primary btn--small add-btn" data-section="education"><i class="fas fa-plus"></i> Add</button>
                    </div>
                    <div class="entry-list" id="educationList"></div>
                </section>

                <!-- Work Experience (with toggle) -->
                <section class="form-section" id="experienceSection">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Work Experience</h3>
                        <label class="toggle-label">
                            <input type="checkbox" class="section-toggle" data-section="experience" checked />
                            <span>Show</span>
                        </label>
                        <button class="btn btn--primary btn--small add-btn" data-section="experience"><i class="fas fa-plus"></i> Add</button>
                    </div>
                    <div class="entry-list" id="experienceList"></div>
                </section>

                <!-- Skills (always visible – no toggle) -->
                <section class="form-section">
                    <h3 class="form-section__title">Skills</h3>
                    <div class="form-group">
                        <div class="skill-input-group">
                            <input type="text" id="skillInput" placeholder="Type a skill and press Enter" />
                            <div class="skill-tags" id="skillTags"></div>
                        </div>
                    </div>
                </section>

                <!-- Projects (with toggle) -->
                <section class="form-section" id="projectsSection">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Projects</h3>
                        <label class="toggle-label">
                            <input type="checkbox" class="section-toggle" data-section="project" checked />
                            <span>Show</span>
                        </label>
                        <button class="btn btn--primary btn--small add-btn" data-section="project"><i class="fas fa-plus"></i> Add</button>
                    </div>
                    <div class="entry-list" id="projectList"></div>
                </section>

                <!-- Certifications (with toggle) -->
                <section class="form-section">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Certifications</h3>
                        <label class="toggle-label">
                            <input type="checkbox" class="section-toggle" data-section="certifications" checked />
                            <span>Show</span>
                        </label>
                    </div>
                    <div class="form-group"><textarea id="certifications" rows="3" placeholder="List your certifications..."></textarea></div>
                </section>

                <!-- Achievements (with toggle) -->
                <section class="form-section">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Achievements</h3>
                        <label class="toggle-label">
                            <input type="checkbox" class="section-toggle" data-section="achievements" checked />
                            <span>Show</span>
                        </label>
                    </div>
                    <div class="form-group"><textarea id="achievements" rows="3" placeholder="List your achievements..."></textarea></div>
                </section>

                <!-- Languages (with toggle) -->
                <section class="form-section">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Languages</h3>
                        <label class="toggle-label">
                            <input type="checkbox" class="section-toggle" data-section="languages" checked />
                            <span>Show</span>
                        </label>
                    </div>
                    <div class="form-group"><textarea id="languages" rows="2" placeholder="e.g. English (Native), Spanish (Fluent)"></textarea></div>
                </section>

                <!-- Interests (with toggle) -->
                <section class="form-section">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Interests / Hobbies</h3>
                        <label class="toggle-label">
                            <input type="checkbox" class="section-toggle" data-section="interests" checked />
                            <span>Show</span>
                        </label>
                    </div>
                    <div class="form-group"><textarea id="interests" rows="2" placeholder="e.g. Photography, Travel"></textarea></div>
                </section>

                <!-- Custom Section (with toggle) -->
                <section class="form-section">
                    <div class="form-section__header">
                        <h3 class="form-section__title">Custom Section</h3>
                        <label class="toggle-label">
                            <input type="checkbox" class="section-toggle" data-section="custom" checked />
                            <span>Show</span>
                        </label>
                    </div>
                    <div class="form-group"><label>Section Title</label><input type="text" id="customTitle" placeholder="e.g. Volunteer Work" /></div>
                    <div class="form-group"><label>Content</label><textarea id="customContent" rows="4" placeholder="Enter your custom content..."></textarea></div>
                </section>

                <!-- Controls -->
                <div class="form-actions">
                    <button class="btn btn--primary" id="clearFormBtn"><i class="fas fa-undo"></i> Clear Form</button>
                    <button class="btn btn--outline" id="resetResumeBtn"><i class="fas fa-trash"></i> Reset Resume</button>
                </div>
            </div>
        </div>

        <!-- RIGHT PANEL: Preview -->
        <div class="builder__preview">
            <div class="builder__preview-toolbar">
                <span><i class="fas fa-eye"></i> Live Preview</span>
                <div class="preview-controls">
                    <select id="templateSelector">
                        <option value="modern">Modern</option>
                        <option value="classic">Classic</option>
                        <option value="creative">Creative</option>
                        <option value="minimal">Minimal</option>
                    </select>
                    <button class="preview-control" id="downloadPdfBtn" title="Download PDF">
                        <i class="fas fa-file-pdf"></i> PDF
                    </button>
                    <button class="preview-control" id="themeToggle"><i class="fas fa-moon"></i></button>
                    <select id="fontSelector">
                        <option value="'Inter', sans-serif">Inter</option>
                        <option value="'Georgia', serif">Georgia</option>
                        <option value="'Arial', sans-serif">Arial</option>
                    </select>
                    <select id="fontSizeSelector">
                        <option value="14">14px</option>
                        <option value="16" selected>16px</option>
                        <option value="18">18px</option>
                        <option value="20">20px</option>
                    </select>
                </div>
            </div>
            <div class="builder__preview-content" id="resumePreview">
                <!-- Dynamic preview rendered by JavaScript -->
            </div>
        </div>
    </div>
</body>
</html>
