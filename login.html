<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Resume By Ame</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">✨ Resume By Ame</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="templates.html">Templates</a></li>
                <li><a href="form.html">Build Resume</a></li>
                <li><a href="login.html" class="btn-login active">Login / Sign Up</a></li>
            </ul>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <div id="authError" class="auth-error" style="display:none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" class="cta-button full-width">Log In</button>
            </form>

            <div class="divider">
                <span>or</span>
            </div>

            <button class="google-btn full-width" id="googleLoginBtn">
                <span class="google-icon">G</span> Sign in with Google
            </button>

            <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
            <p class="auth-switch"><a href="index.html">← Back to Home</a></p>
        </div>
    </main>

    <footer>
        <p>Made with ❤️ by Ame</p>
    </footer>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBLX-DBrAZZgi7OGRW3-oeno0PJsZ9hzEg",
            authDomain: "its-me-ame.firebaseapp.com",
            projectId: "its-me-ame",
            storageBucket: "its-me-ame.firebasestorage.app",
            messagingSenderId: "832380884001",
            appId: "1:832380884001:web:0c9239588ceb8d8995bf60",
            measurementId: "G-L12EEJG7L9"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Email/Password Login
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('authError');
            errorDiv.style.display = 'none';

            if (!email || !password) {
                errorDiv.textContent = 'Please fill in all fields.';
                errorDiv.style.display = 'block';
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    window.location.href = 'form.html';
                })
                .catch((error) => {
                    errorDiv.textContent = error.message;
                    errorDiv.style.display = 'block';
                });
        });

        // Google Sign-In
        document.getElementById('googleLoginBtn').addEventListener('click', function() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const errorDiv = document.getElementById('authError');
            errorDiv.style.display = 'none';

            auth.signInWithPopup(provider)
                .then((result) => {
                    window.location.href = 'form.html';
                })
                .catch((error) => {
                    errorDiv.textContent = error.message;
                    errorDiv.style.display = 'block';
                });
        });
    </script>
</body>
</html>
