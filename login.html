<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Resume By Ame</title>
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/SRTd6c43/A-minimalistic-favicon-for-a-202606251237.jpg">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">✨ Resume By Ame</a>
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="templates.html">Templates</a></li>
                <li><a href="form.html">Build Resume</a></li>
                <li id="dashboardLink" style="display:none;"><a href="dashboard.html">Dashboard</a></li>
                <li id="authLink"><a href="login.html" class="btn-login active">Login / Sign Up</a></li>
                <li id="userDisplay" style="display:none;">
                    <span id="userName"></span>
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="auth-container">
        <div class="auth-card fade-up">
            <h2>Welcome Back</h2>
            <div id="authError" class="auth-error" style="display:none;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" required placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" class="cta-button full-width">Log In</button>
            </form>

            <div class="divider"><span>or</span></div>

            <button class="google-btn full-width" id="googleLoginBtn">
                <span class="google-icon">G</span> Sign in with Google
            </button>

            <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
            <p class="auth-switch"><a href="index.html">← Back to Home</a></p>
        </div>
    </main>

    <footer>
        <p>Made with ❤️ by Ame</p>
    </footer>

    <script src="js/animations.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
