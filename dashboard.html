<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – Resume By Ame</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/SRTd6c43/A-minimalistic-favicon-for-a-202606251237.jpg">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">✨ Resume By Ame</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="templates.html">Templates</a></li>
                <li><a href="form.html">Build Resume</a></li>
                <li id="dashboardLink"><a href="dashboard.html" class="active">Dashboard</a></li>
                <li id="authLink"><a href="login.html" class="btn-login">Login / Sign Up</a></li>
                <li id="userDisplay" style="display:none;">
                    <span id="userName"></span>
                    <button id="logoutBtn" class="btn-logout">Logout</button>
                </li>
            </ul>
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu">☰</button>
        </div>
    </nav>

    <main>
        <div class="dashboard-wrapper fade-in">
            <aside class="profile-sidebar">
                <div class="avatar-circle" id="avatarLetter">?</div>
                <div class="welcome-text">Welcome, <strong id="welcomeName">User</strong></div>
                <div class="user-email" id="userEmailDisplay">user@example.com</div>
                <button class="logout-btn-side" id="sidebarLogout">Logout</button>
            </aside>
            <section class="resumes-section">
                <div class="create-new-btn">
                    <a href="form.html" class="cta-button">+ Create New Resume</a>
                </div>
                <table class="resumes-table" id="resumeTable">
                    <thead>
                        <tr><th>Name</th><th>Template</th><th>Created</th><th>Action</th></tr>
                    </thead>
                    <tbody id="resumeTableBody">
                        <tr><td colspan="4">Loading…</td></tr>
                    </tbody>
                </table>
                <p id="noResumesMsg" style="display:none; margin-top:1rem;">No resumes yet. Create your first one!</p>
            </section>
        </div>
    </main>

    <footer>
        <p>Made with ❤️ by Ame</p>
    </footer>

    <script src="js/animations.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLX-DBrAZZgi7OGRW3-oeno0PJsZ9hzEg",
            authDomain: "its-me-ame.firebaseapp.com",
            projectId: "its-me-ame",
            storageBucket: "its-me-ame.firebasestorage.app",
            messagingSenderId: "832380884001",
            appId: "1:832380884001:web:0c9239588ceb8d8995bf60"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const authLink = document.getElementById('authLink');
        const userDisplay = document.getElementById('userDisplay');
        const userNameSpan = document.getElementById('userName');
        const logoutBtn = document.getElementById('logoutBtn');
        const sidebarLogout = document.getElementById('sidebarLogout');
        const avatarLetter = document.getElementById('avatarLetter');
        const welcomeName = document.getElementById('welcomeName');
        const userEmailDisplay = document.getElementById('userEmailDisplay');
        const resumeTableBody = document.getElementById('resumeTableBody');
        const noResumesMsg = document.getElementById('noResumesMsg');
        const hamburgerBtn = document.getElementById('hamburgerBtn');

        // Hamburger menu toggle
        hamburgerBtn.addEventListener('click', () => {
            document.querySelector('.nav-links').classList.toggle('show');
        });

        function updateUI(user) {
            if (user) {
                const displayName = user.displayName || user.email;
                const firstName = displayName.split(' ')[0] || displayName;
                const firstLetter = (user.displayName?.[0] || user.email[0]).toUpperCase();
                avatarLetter.textContent = firstLetter;
                welcomeName.textContent = firstName;
                userEmailDisplay.textContent = user.email;

                authLink.style.display = 'none';
                userDisplay.style.display = 'flex';
                userNameSpan.textContent = displayName;
                document.getElementById('dashboardLink').style.display = 'inline-block';
                loadResumes(user.uid);
            } else {
                window.location.href = 'login.html';
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) updateUI(user);
            else window.location.href = 'login.html';
        });

        logoutBtn.addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));
        sidebarLogout.addEventListener('click', () => auth.signOut().then(() => window.location.href = 'index.html'));

        function loadResumes(uid) {
            resumeTableBody.innerHTML = '<tr><td colspan="4">Loading…</td></tr>';
            db.collection('resumes')
                .where('uid', '==', uid)
                .get()
                .then(snapshot => {
                    if (snapshot.empty) {
                        resumeTableBody.innerHTML = '';
                        noResumesMsg.style.display = 'block';
                        return;
                    }
                    noResumesMsg.style.display = 'none';
                    let resumes = [];
                    snapshot.forEach(doc => {
                        const resume = doc.data();
                        resume.id = doc.id;
                        resumes.push(resume);
                    });
                    // Sort by createdAt descending (client-side)
                    resumes.sort((a, b) => {
                        const timeA = a.createdAt ? a.createdAt.toMillis() : 0;
                        const timeB = b.createdAt ? b.createdAt.toMillis() : 0;
                        return timeB - timeA;
                    });
                    let html = '';
                    resumes.forEach(resume => {
                        const date = resume.createdAt ? resume.createdAt.toDate().toLocaleDateString() : 'N/A';
                        html += `
                            <tr>
                                <td>${resume.name || 'Unnamed'}</td>
                                <td>${resume.template}</td>
                                <td>${date}</td>
                                <td><a href="#" class="action-link" onclick="alert('Download coming soon')">Download</a></td>
                            </tr>
                        `;
                    });
                    resumeTableBody.innerHTML = html;
                })
                .catch(err => {
                    resumeTableBody.innerHTML = `<tr><td colspan="4">Error: ${err.message}</td></tr>`;
                });
        }
    </script>
</body>
</html>
