<!DOCTYPE html>
<!-- dashboard.html - User Dashboard -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Resume By Dav ♥️ Ame</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="mobile-sidebar" id="mobileSidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">Resume By Dav ♥️ Ame</span>
            <button class="sidebar-close" id="sidebarClose">✕</button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="sidebar-link">🏠 Home</a>
            <a href="index.html#templates" class="sidebar-link">📄 Templates</a>
            <a href="dashboard.html" class="sidebar-link active">📊 Dashboard</a>
            <a href="#" class="sidebar-link" id="sidebarLogoutDash">🚪 Logout</a>
        </nav>
    </aside>

    <header class="navbar">
        <div class="nav-container">
            <button class="hamburger" id="hamburgerBtn" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <a href="index.html" class="nav-logo">Resume By Dav ♥️ Ame</a>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="index.html#templates">Templates</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="#" id="navLogoutDash">Logout</a>
            </nav>
        </div>
    </header>

    <main class="dashboard-page">
        <!-- Profile Section -->
        <section class="dashboard-profile fade-in">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar">U</div>
                <div class="profile-info">
                    <h2 id="welcomeMessage">Welcome, User</h2>
                    <p id="profileEmail">user@example.com</p>
                </div>
                <button class="btn btn-outline btn-sm" id="dashboardLogoutBtn">🚪 Logout</button>
            </div>
        </section>

        <!-- Resumes Section -->
        <section class="dashboard-resumes fade-in">
            <div class="section-header">
                <h2>📄 My Resumes</h2>
                <a href="index.html#templates" class="btn btn-primary">+ Create New Resume</a>
            </div>
            <div class="resumes-grid" id="resumesGrid">
                <!-- Saved resumes will be displayed here -->
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📭</div>
                    <h3>No resumes yet</h3>
                    <p>Create your first resume to see it here!</p>
                    <a href="index.html#templates" class="btn btn-primary">Create Resume</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-bottom">
            <p>Made with ♥️ by Dav & Ame — © 2026</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initNavigation();
            initSidebar();
            initDashboard();
            updateAuthUI();
        });
    </script>
</body>
</html>
